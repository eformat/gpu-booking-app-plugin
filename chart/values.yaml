replicaCount: 1

image:
  repository: quay.io/eformat/gpu-booking-plugin
  tag: latest
  pullPolicy: Always

plugin:
  name: gpu-booking-plugin
  displayName: "GPU Booking Plugin"
  port: 9443

serviceAccount:
  create: true
  name: gpu-booking-plugin

service:
  type: ClusterIP
  port: 9443

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /app/data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

tls:
  enabled: true

enablePlugin: true

kueue:
  syncEnabled: true
  syncIntervalSeconds: 30
  syncDays: 7

bookingWindowDays: 30
